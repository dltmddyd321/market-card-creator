<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Market Card Creator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Gowun+Dodum&family=Jua&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Left Panel: Controls -->
        <aside class="controls-panel">
            <header>
                <h1>App Market Card Creator <span>✨</span></h1>
                <p>AI가 완벽한 소개 카드를 만들어드립니다.</p>
            </header>

            <section class="control-group font-section">
                <h2>폰트 설정</h2>
                <div class="input-field">
                    <label for="fontSelect">기본 제공 폰트</label>
                    <select id="fontSelect" class="form-select">
                        <option value="'Pretendard', sans-serif">Pretendard (기본)</option>
                        <option value="'Noto Sans KR', sans-serif">Noto Sans KR</option>
                        <option value="'Gowun Dodum', sans-serif">고운 돋움</option>
                        <option value="'Jua', sans-serif">배달의민족 주아</option>
                    </select>
                </div>
                <div class="input-field">
                    <label for="fontUpload">또는 커스텀 폰트 업로드 (.ttf, .otf, .woff)</label>
                    <input type="file" id="fontUpload" accept=".ttf,.otf,.woff,.woff2">
                    <small>다운받은 폰트 파일(.ttf 등)을 올리면 바로 적용됩니다.</small>
                </div>
            </section>

            <section class="control-group">
                <h2>기본 설정 (수동)</h2>

                <div class="input-field">
                    <label for="imageUpload">앱 스크린샷 (.png, .jpg)</label>
                    <input type="file" id="imageUpload" accept="image/*">
                </div>

                <div class="input-field">
                    <label for="mainTitle">메인 타이틀</label>
                    <input type="text" id="mainTitle" placeholder="사랑의 시작일,">
                </div>

                <div class="input-field">
                    <label for="subTitle">서브 타이틀</label>
                    <input type="text" id="subTitle" placeholder="직관적으로 확인해요!">
                </div>
            </section>

            <section class="control-group advanced-section">
                <h2>고급 레이아웃 및 디자인</h2>

                <div class="input-field">
                    <label for="layoutSelect">화면 레이아웃</label>
                    <select id="layoutSelect" class="form-select">
                        <option value="column">텍스트 상단 / 폰 하단 (기본)</option>
                        <option value="column-reverse">폰 상단 / 텍스트 하단</option>
                    </select>
                </div>

                <div class="input-field">
                    <label for="deviceFrameSelect">디바이스 프레임 테마</label>
                    <select id="deviceFrameSelect" class="form-select">
                        <option value="notch">아이폰 (Notch)</option>
                        <option value="punchhole">안드로이드 (Punch-hole)</option>
                        <option value="minimal">미니멀 (프레임 없음, 그림자만)</option>
                    </select>
                </div>

                <div class="input-field">
                    <label for="bgPatternSelect">배경 패턴</label>
                    <select id="bgPatternSelect" class="form-select">
                        <option value="none">단색/그라디언트 (패턴 없음)</option>
                        <option value="dots">도트 무늬 (Dots)</option>
                        <option value="grid">모눈 무늬 (Grid)</option>
                    </select>
                </div>

                <div class="input-field">
                    <label>스토어 뱃지 추가</label>
                    <div style="display: flex; gap: 16px; margin-top: 8px;">
                        <label
                            style="display: flex; align-items: center; gap: 4px; font-weight: normal; font-size: 14px; cursor: pointer;">
                            <input type="checkbox" id="badgeAppStore"> App Store
                        </label>
                        <label
                            style="display: flex; align-items: center; gap: 4px; font-weight: normal; font-size: 14px; cursor: pointer;">
                            <input type="checkbox" id="badgeGooglePlay"> Google Play
                        </label>
                    </div>
                </div>
            </section>

            <section class="control-group style-section">
                <h2>타이포그래피 및 스타일</h2>
                <div class="input-field">
                    <label for="textAlignSelect">텍스트 정렬</label>
                    <select id="textAlignSelect" class="form-select">
                        <option value="center">가운데 정렬</option>
                        <option value="left">좌측 정렬</option>
                        <option value="right">우측 정렬</option>
                    </select>
                </div>

                <div class="input-field">
                    <label for="titleSize">타이틀 크기 (<span id="titleSizeVal">32</span>px)</label>
                    <input type="range" id="titleSize" min="20" max="60" value="32" style="width: 100%;">
                </div>
                <div class="input-field">
                    <label for="subTitleSize">서브타이틀 크기 (<span id="subTitleSizeVal">24</span>px)</label>
                    <input type="range" id="subTitleSize" min="14" max="40" value="24" style="width: 100%;">
                </div>
                <div class="color-picker-group">
                    <div class="input-field">
                        <label for="bgColorTop">배경색 (Top)</label>
                        <input type="color" id="bgColorTop" value="#ffffff">
                    </div>
                    <div class="input-field">
                        <label for="bgColorBottom">배경색 (Bottom)</label>
                        <input type="color" id="bgColorBottom" value="#ffffff">
                    </div>
                </div>

                <div class="color-picker-group">
                    <div class="input-field">
                        <label for="titleColor">타이틀 색상</label>
                        <input type="color" id="titleColor" value="#ff8c9b">
                    </div>
                    <div class="input-field">
                        <label for="subTitleColor">서브타이틀 색상</label>
                        <input type="color" id="subTitleColor" value="#ff8c9b">
                    </div>
                </div>
            </section>

            <button id="downloadBtn" class="btn secondary-btn">
                <span class="btn-icon">⬇️</span> 고화질 이미지 다운로드
            </button>
        </aside>

        <!-- Right Panel: Preview -->
        <main class="preview-panel">
            <div class="canvas-wrapper">
                <div id="captureArea" class="market-card">
                    <div class="card-text-area">
                        <h1 id="previewMainTitle" class="preview-title">사랑의 시작일,</h1>
                        <h2 id="previewSubTitle" class="preview-subtitle">직관적으로 확인해요!</h2>
                        <div class="badges-container" id="badgesContainer" style="display: none;">
                            <div class="store-badge badge-appstore" id="previewBadgeAppStore" style="display: none;">
                                <svg viewBox="0 0 512 512" width="20" height="20" fill="currentColor">
                                    <path
                                        d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 24 184.8 24 273.5c0 88.1 36.2 166.7 84 227.1 23.4 29.5 48.9 51.5 77 51.5 27.6 0 46.5-17.7 85.3-17.7 38.8 0 55.4 18.2 84.7 18.2 29.3 0 52.8-22.5 76.5-51.5 27.4-33.8 38.6-67.6 39-69.2-1.2-.5-51.9-20-51.8-163.2zM325.8 81.6c40.3-46.6 28.3-81.6 28.3-81.6-33.3 2.1-66.7 21.2-86.7 46.1-22.3 27.9-32.9 66-24 93.9 33.7 2.1 63.3-11.8 82.4-58.4z" />
                                </svg>
                                App Store
                            </div>
                            <div class="store-badge badge-googleplay" id="previewBadgeGooglePlay"
                                style="display: none;">
                                <svg viewBox="0 0 512 512" width="20" height="20" fill="currentColor">
                                    <path
                                        d="M325.3 234.3L104.6 13l280.8 161.2-60.1 60.1zM47 0C34 6.8 25.3 19.2 25.3 35.3v441.3c0 16.1 8.7 28.5 21.7 35.3l256.6-256L47 0zm425.2 225.6l-58.9-34.1-65.7 64.5 65.7 64.5 60.1-34.1c18-14.3 18-46.5-1.2-60.8zM104.6 499l280.8-161.2-60.1-60.1L104.6 499z" />
                                </svg>
                                Google Play
                            </div>
                        </div>
                    </div>

                    <div class="device-mockup" id="deviceMockup">
                        <div class="device-frame" id="deviceFrame">
                            <div class="device-notch" id="deviceNotch"></div>
                            <img id="previewImage" src="" alt="앱 스크린샷 미등록">
                            <div class="device-placeholder">
                                <span>스크린샷을 업로드 해주세요</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
